<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Meta Ads</title>
    <style>
        * { box-sizing: border-box; }
        body { overflow-x: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0f1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            color: white;
        }
        h1 { font-size: 20px; margin-bottom: 24px; }
        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
        }
        @media(max-width:640px){ body { justify-content: flex-start; padding-top: 24px; } .card { max-width: 100%; } }
        label { font-size: 13px; color: #64748b; display: block; margin-bottom: 4px; }
        input {
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 14px;
            border: 1px solid #1e293b;
            border-radius: 8px;
            font-size: 14px;
            background: #0a0f1e;
            color: white;
            transition: border-color 0.15s;
        }
        input:focus { outline: none; border-color: #2d5a9e; }
        .btn-salvar {
            width: 100%;
            padding: 12px;
            background: #1e3a5f;
            color: #93c5fd;
            border: 1px solid #2d5a9e;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-salvar:hover { background: #1e40af; color: white; }
        .btn-excluir {
            width: 100%;
            padding: 11px;
            background: transparent;
            color: #64748b;
            border: 1px solid #1e293b;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.15s;
        }
        .btn-excluir:hover { background: #450a0a; color: #f87171; border-color: #7f1d1d; }
        .voltar { color: #475569; text-decoration: none; margin-bottom: 20px; display: inline-block; font-size: 14px; }
        .voltar:hover { color: #94a3b8; }
        .canal-tag {
            display: inline-block;
            background: #0d2a5e;
            color: #3b82f6;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.06em;
        }
    
        /* ── MOBILE RESPONSIVO ── */
        @media (max-width: 640px) {
            body { padding: 16px 14px !important; }
            h1 { font-size: 18px !important; }

            /* Nav / topo */
            .nav, .topo { flex-wrap: wrap; gap: 8px; }
            .topo-acoes { flex-wrap: wrap; }
            .brand { font-size: 16px !important; }

            /* Header cards */
            .header { padding: 16px 18px !important; flex-direction: column; align-items: flex-start !important; }
            .header h1 { font-size: 20px !important; }
            .header-btns { width: 100%; }
            .header-btns .btn, .header-btns a { flex: 1; justify-content: center; font-size: 12px !important; padding: 8px 10px !important; }

            /* Grids viram coluna única */
            .grid-3, .grid-2, .kpi-grid { grid-template-columns: 1fr !important; }
            .check-cols { grid-template-columns: 1fr !important; }
            .metricas-grid { grid-template-columns: 1fr 1fr !important; }

            /* Tabelas — scroll horizontal */
            .table-wrap, table { overflow-x: auto; display: block; -webkit-overflow-scrolling: touch; }
            table { min-width: 480px; }

            /* Formulários */
            .card, .box { padding: 20px 16px !important; }
            .layout { grid-template-columns: 1fr !important; }

            /* Botões de ação empilham */
            .acoes { flex-wrap: wrap; gap: 6px; }
            .acoes .btn-ver { flex: 1; text-align: center; }

            /* Semana bar */
            .semana-bar { flex-direction: column; align-items: flex-start !important; gap: 8px !important; }
            .semana-bar select { width: 100%; }
            .status-badge { margin-left: 0 !important; }

            /* Período bar relatório */
            .periodo-bar { flex-wrap: wrap; gap: 8px; }

            /* Calendário */
            .cal-wrap { padding: 12px !important; }
            .fc .fc-toolbar { flex-direction: column; gap: 8px; }
            .fc .fc-toolbar-title { font-size: 14px !important; }

            /* Checklist */
            .checklist-card { padding: 16px !important; }

            /* IA card */
            .ia-card { padding: 16px !important; }
            .ia-tabs { gap: 6px; }
            .ia-tab { font-size: 11px !important; padding: 5px 10px !important; }

            /* Hist tabs */
            .hist-tabs { gap: 6px; }
            .hist-tab { font-size: 11px !important; padding: 5px 10px !important; }

            /* Ganchos grid */
            .ganchos-grid { grid-template-columns: 1fr !important; }
            .stats-row { flex-direction: column; }

            /* Filtros */
            .filtros { gap: 6px; }
            .filtro-btn { font-size: 11px !important; padding: 5px 10px !important; }

            /* Login/cadastro/setup */
            .box { max-width: 100% !important; }

            /* Charts — altura menor no mobile */
            .chart-wrap { height: 130px !important; }

            /* Modal */
            .modal { width: 95% !important; padding: 20px !important; }

            /* Painel lateral vira coluna */
            .painel { order: 2; }
            .cal-wrap { order: 1; }

            /* Botões de submit full width */
            .btn-submit, .btn-salvar, .btn-entrar, .btn-cadastrar, .btn { width: 100%; }

            /* Overflow geral */
            * { max-width: 100%; }
            pre { white-space: pre-wrap; word-break: break-word; }
        }

        @media (max-width: 400px) {
            body { padding: 12px 10px !important; }
            .met-val { font-size: 15px !important; }
            .kpi-val { font-size: 20px !important; }
            thead th { font-size: 9px !important; padding: 7px 8px !important; }
            td { font-size: 11px !important; padding: 7px 8px !important; }
        }

        </style>
</head>
<body>

    <div id="loader" style="position:fixed;inset:0;z-index:9999;background:#0a0f1e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.4s ease;">
        <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:22px;">📊</span>
            <span style="font-size:20px;font-weight:700;color:white;">Amigo Gestor</span>
        </div>
        <div style="width:180px;height:3px;background:#1e293b;border-radius:99px;overflow:hidden;">
            <div id="loader-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:99px;transition:width 0.5s ease;"></div>
        </div>
        <span style="font-size:13px;color:#475569;" id="loader-txt">Carregando...</span>
    </div>

    <a class="voltar" href="javascript:history.back()">← Voltar</a>
    <span class="canal-tag">📘 META ADS</span>
    <h1>Editar Meta Ads</h1>

    <div class="card">
        {# Índices: 0=id, 1=cliente_id, 2=data, 3=cpm, 4=cpc, 5=ctr, 6=roas, 7=cpa, 8=frequencia, 9=conversoes #}
        <form action="/editar/meta/{{ m[0] }}" method="POST">
            <label>Data</label>
            <input type="date" name="data" value="{{ m[2] }}" required>
            <label>CPM (R$)</label>
            <input type="number" step="0.01" name="cpm" value="{{ m[3] }}">
            <label>CPC (R$)</label>
            <input type="number" step="0.01" name="cpc" value="{{ m[4] }}">
            <label>CTR (%)</label>
            <input type="number" step="0.01" name="ctr" value="{{ m[5] }}">
            <label>ROAS</label>
            <input type="number" step="0.01" name="roas" value="{{ m[6] }}">
            <label>CPA (R$)</label>
            <input type="number" step="0.01" name="cpa" value="{{ m[7] }}">
            <label>Frequência</label>
            <input type="number" step="0.01" name="frequencia" value="{{ m[8] }}">
            <label>Conversões</label>
            <input type="number" name="conversoes" value="{{ m[9] }}">
            <button class="btn-salvar" type="submit">Salvar alterações</button>
        </form>
        <form action="/excluir/meta/{{ m[0] }}" method="POST" onsubmit="return confirm('Excluir esta métrica de Meta Ads? Essa ação não pode ser desfeita.')">
            <button class="btn-excluir" type="submit">🗑️ Excluir esta métrica</button>
        </form>
    </div>

    <script>
        (function(){
            var bar=document.getElementById('loader-bar'),txt=document.getElementById('loader-txt'),loader=document.getElementById('loader'),p=0,i=0;
            var msgs=['Carregando...','Buscando dados...','Quase lá...'];
            var iv=setInterval(function(){p=Math.min(p+Math.random()*18+5,88);bar.style.width=p+'%';if(i<msgs.length-1&&p>40+i*25){i++;txt.textContent=msgs[i];}},180);
            window.addEventListener('load',function(){clearInterval(iv);bar.style.width='100%';txt.textContent='Pronto!';setTimeout(function(){loader.style.opacity='0';setTimeout(function(){loader.style.display='none';},400);},200);});
            document.querySelectorAll('a[href],button[type=submit]').forEach(function(el){el.addEventListener('click',function(){loader.style.display='flex';loader.style.opacity='1';bar.style.width='0%';p=0;i=0;txt.textContent='Carregando...';setInterval(function(){p=Math.min(p+Math.random()*20+8,85);bar.style.width=p+'%';},150);});});
        })();
    </script>
</body>
</html>
